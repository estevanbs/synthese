<div class="sidebar">
  <div class="sidebar-header">
    <span class="sidebar-title">Synthese</span>
    <button class="new-note-btn" (click)="requestNewNote()" title="New note">+</button>
  </div>

  <div class="topics-list">
    @if (topics().length === 0) {
      <div class="empty-state">
        <p>No topics yet</p>
        <p class="empty-hint">Start writing to create your first topic</p>
      </div>
    }

    @for (topic of topics(); track topic.id) {
      <button
        class="topic-item"
        [class.active]="isSelected()(topic.id)"
        (click)="selectTopic(topic)"
      >
        <span class="topic-name">{{ topic.name }}</span>
        <button
          class="delete-btn"
          [class.confirming]="pendingDeleteId() === topic.id"
          (click)="onDeleteClick($event, topic)"
          [title]="pendingDeleteId() === topic.id ? 'Confirm deletion' : 'Delete topic'"
        >
          @if (pendingDeleteId() === topic.id) {
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
              <path d="M10 11v6"></path>
              <path d="M14 11v6"></path>
              <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path>
            </svg>
          }
        </button>
      </button>
    }
  </div>
</div>
