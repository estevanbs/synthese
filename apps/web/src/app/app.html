<div class="app-layout">
  <app-sidebar
    [topics]="topics()"
    [selectedTopicId]="selectedTopic()?.id ?? null"
    (topicSelected)="selectTopic($event)"
    (topicDeleted)="deleteTopic($event)"
    (newNoteRequested)="openEditor()"
  />

  <main class="main-content">
    @if (showEditor()) {
      <app-editor (notesSaved)="onNotesSaved($event)" />
    } @else if (selectedTopic(); as topic) {
      <app-topic-view [topic]="topic" />
    }
  </main>
</div>
